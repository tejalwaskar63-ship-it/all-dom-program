<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Mouse Hover Example</title>
</head>

<body>

<!-- Paragraph with mouse hover event -->
<p onmouseover="hover()">Hover Mouse Here</p>

<script>
function hover(){

    // Show alert when mouse moves over paragraph
    alert("Mouse Hover Detected");

}
</script>

</body>
</html>
</body>
</html>
