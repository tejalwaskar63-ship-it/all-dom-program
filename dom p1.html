<body>
  <!DOCTYPE html>
<html>
<head>
<title>Change Text Example</title>
</head>

<body>

<!-- Heading with id 'title' -->
<h1 id="title">Hello</h1>

<!-- Button that calls changeText() function when clicked -->
<button onclick="changeText()">Change</button>

<script>
// Function to change the heading text
function changeText() {
    // Select element using id and change its content
    document.getElementById("title").innerHTML = "Welcome Students";
}
</script>

</body>
</html>  
</body>
</html>
