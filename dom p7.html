<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Show Paragraph</title>
</head>

<body>

<!-- Paragraph initially hidden -->
<p id="para" style="display:none">Hello Students</p>

<!-- Button to show paragraph -->
<button onclick="show()">Show</button>

<script>
function show(){

    // Change display property to block
    // This makes paragraph visible
    document.getElementById("para").style.display = "block";

}
</script>

</body>
</html>
</body>
</html>
