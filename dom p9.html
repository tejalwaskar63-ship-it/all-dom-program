<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Click Counter</title>
</head>

<body>

<!-- Button to count clicks -->
<button onclick="count()">Click</button>

<!-- Paragraph to display count -->
<p id="demo">0</p>

<script>
// Variable to store count
let c = 0;

function count(){

    // Increase count by 1
    c++;

    // Display updated count
    document.getElementById("demo").innerHTML = c;

}
</script>

</body>
</html>
</body>
</html>
