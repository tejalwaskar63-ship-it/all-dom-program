<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Increase Font Size</title>
</head>

<body>

<!-- Paragraph with id -->
<p id="text">Hello Students</p>

<!-- Button to increase font size -->
<button onclick="increase()">Increase Size</button>

<script>
// Function to increase text size
function increase(){

    // Select paragraph using id
    // Change font size using CSS property
    document.getElementById("text").style.fontSize = "30px";

}
</script>

</body>
</html>
</body>
</html>
