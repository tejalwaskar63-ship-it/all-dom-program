   <!DOCTYPE html>
<html>
<head>
    <title>Change Button Text</title>
</head>

<body>

<!-- Button with id -->
<button id="btn" onclick="change()">Click</button>

<script>
function change(){

    // Change button text
    document.getElementById("btn").innerHTML = "Submitted";

}
</script>

</body>
