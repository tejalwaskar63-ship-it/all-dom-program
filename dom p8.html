<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Change Image</title>
</head>

<body>

<!-- Image with id -->
<img id="img" src="bulb_off.png" width="100">

<!-- Button to change image -->
<button onclick="on()">ON</button>

<script>
function on(){

    // Change image source
    // This replaces old image with new one
    document.getElementById("img").src = "bulb_on.png";

}
</script>

</body>
</html>
</body>
</html>
