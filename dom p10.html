 <!DOCTYPE html>
<html>
<head>
    <title>Change Text Color</title>
</head>

<body>

<!-- Paragraph -->
<p id="text">DOM Example</p>

<!-- Button to change color -->
<button onclick="color()">Change Color</button>

<script>
function color(){
    // Change text color to red
    document.getElementById("text").style.color = "red";
}
</script>

</body>
</html>
